<body>

  <div id="topBar">
    <button id="practiceTab">Practice</button>
    <button id="multiplayerTab">Multiplayer</button>
  </div>

  <h1>8 Puzzle Game</h1>
  <div id="moves">Moves: 0</div>

  <!-- PUZZLE BOARD -->
  <div id="board"></div>

  <button id="restartBtn" class="hidden">Restart</button>

  <!-- MULTIPLAYER SECTION -->
  <div id="multiplayerPanel" class="hidden">
    <button id="createRoomBtn">Create Room</button>

    <input id="roomInput" placeholder="Enter Room Code">
    <button id="joinRoomBtn">Join Room</button>

    <button id="startMatchBtn" class="hidden">Start Match</button>
    <button id="leaveMatchBtn" class="hidden">Leave Match</button>

    <div id="playerListContainer" class="hidden">
      <h3>Players</h3>
      <ul id="playerList"></ul>
    </div>
  </div>

  <!-- WIN POPUP -->
  <div id="winPopup" class="popup hidden">
    <h2>You Win!</h2>
    <p id="moveCountText"></p>
    <button id="closePopup">Close</button>
  </div>

  <!-- CONFETTI -->
  <canvas id="confetti"></canvas>

</body>
