<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>8‑Puzzler</title>
  <link rel="stylesheet" href="style.css?v=10" />
</head>
<body>

  <!-- FULLSCREEN LOGIN OVERLAY -->
<div id="loginOverlay" class="hidden">

  <!-- STEP 1: EMAIL -->
  <div id="loginStepEmail" class="loginStep">
    <h1>Sign In</h1>
    <p>Enter your email to continue</p>
    <input id="loginEmail" type="email" placeholder="Email" />
    <button id="emailNextBtn">Next</button>
    <button id="googleLoginBtn">Sign in with Google</button>
    <button id="cancelLoginBtn" class="cancel-btn">Nevermind</button>
  </div>

  <!-- STEP 2: PASSWORD -->
  <div id="loginStepPassword" class="loginStep hidden">
    <h1>Welcome Back</h1>
    <p>Enter your password</p>
    <input id="loginPassword" type="password" placeholder="Password" />
    <button id="passwordLoginBtn">Log In</button>
    <button id="backToEmailBtn" class="cancel-btn">Back</button>
  </div>

  <!-- STEP 3: USERNAME -->
  <div id="loginStepUsername" class="loginStep hidden">
    <h1>Create Account</h1>
    <p>Choose a username</p>
    <input id="loginUsername" type="text" placeholder="Username" />
    <button id="createAccountBtn">Create Account</button>
    <button id="backToPasswordBtn" class="cancel-btn">Back</button>
  </div>

</div>


  <!-- NAVBAR -->
  <header id="navWrapper">
    <div id="navBar">
      <div id="navTabs">
        <button id="practiceTab" class="nav-tab active">Practice</button>
        <button id="multiplayerTab" class="nav-tab">Multiplayer</button>
      </div>

      <div id="userIconContainer" class="hidden">
        <div id="userIcon"></div>
        <div id="userMenu" class="hidden">
          <div id="userNameCapsule">Guest</div>
          <div class="userMenuDivider"></div>
          <button id="logoutBtn">Log Out</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <h1>8‑Puzzler</h1>
    <div id="moves">Moves: 0</div>

    <!-- PRACTICE -->
    <section id="practicePanel">
      <div id="board"></div>
      <button id="restartBtn" class="hidden">Restart</button>
    </section>

    <!-- MULTIPLAYER -->
    <section id="multiplayerPanel" class="hidden">
      <div class="mp-row">
        <button id="createRoomBtn">Create Room</button>
      </div>

      <div class="mp-row">
        <input id="roomInput" placeholder="Enter room code" />
        <button id="joinRoomBtn">Join Room</button>
      </div>

      <div class="mp-row" id="roomCodeText"></div>

      <div id="playerListContainer">
        <h3>Players</h3>
        <ul id="playerList"></ul>
      </div>
    </section>
  </main>

  <!-- WIN POPUP -->
  <div id="winPopup" class="popup hidden">
    <h2>Nice!</h2>
    <p id="moveCountText"></p>
    <div class="popup-buttons">
      <button id="closePopup">Close</button>
    </div>
  </div>

  <!-- CONFETTI -->
  <canvas id="confetti"></canvas>

  <!-- SCRIPTS -->
  <script type="module" src="multiplayer.js?v=10"></script>
  <script type="module" src="practice.js?v=10"></script>

</body>
</html>
