<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>8‑Puzzler</title>
  <link rel="stylesheet" href="style.css?v=10" />
</head>
<body>

  <!-- FULLSCREEN LOGIN -->
  <div id="loginOverlay" class="hidden">
    <div id="loginBox">
      <h1>Welcome</h1>
      <p>Sign in to access Multiplayer</p>

      <button id="googleLoginBtn">Sign in with Google</button>
      <button id="cancelLoginBtn" class="cancel-btn">Nevermind</button>
    </div>
  </div>

  <!-- NAVBAR -->
  <header id="navWrapper">
    <div id="navBar">
      <div id="navTabs">
        <button id="practiceTab" class="nav-tab active">Practice</button>
        <button id="multiplayerTab" class="nav-tab">Multiplayer</button>
      </div>

      <div id="userIconContainer" class="hidden">
        <div id="userIcon"></div>
        <div id="userMenu" class="hidden">
          <div id="userNameCapsule">Guest</div>
          <div class="userMenuDivider"></div>
          <button id="logoutBtn">Log Out</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <h1>8‑Puzzler</h1>
    <div id="moves">Moves: 0</div>

    <!-- PRACTICE -->
    <section id="practicePanel">
      <div id="board"></div>
      <button id="restartBtn" class="hidden">Restart</button>
    </section>

    <!-- MULTIPLAYER -->
    <section id="multiplayerPanel" class="hidden">
      <div class="mp-row">
        <button id="createRoomBtn">Create Room</button>
      </div>

      <div class="mp-row">
        <input id="roomInput" placeholder="Enter room code" />
        <button id="joinRoomBtn">Join Room</button>
      </div>

      <div class="mp-row" id="roomCodeText"></div>

      <div id="playerListContainer">
        <h3>Players</h3>
        <ul id="playerList"></ul>
      </div>
    </section>
  </main>

  <!-- WIN POPUP -->
  <div id="winPopup" class="popup hidden">
    <h2>Nice!</h2>
    <p id="moveCountText"></p>
    <div class="popup-buttons">
      <button id="closePopup">Close</button>
    </div>
  </div>

  <!-- CONFETTI -->
  <canvas id="confetti"></canvas>

  <!-- SCRIPTS -->
  <script type="module" src="practice.js?v=10"></script>
  <script type="module" src="multiplayer.js?v=10"></script>

</body>
</html>
